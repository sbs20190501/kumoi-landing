<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Kumoi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --ink: #1a1d23; --brand: #15725f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: "Noto Sans JP", sans-serif;
            color: var(--ink); background: #fff;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 2rem;
        }
        .bar { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--brand); }
        .logo {
            font-family: "Zen Kaku Gothic New", sans-serif;
            font-weight: 700; font-size: 2rem; letter-spacing: -0.02em;
            color: var(--ink); margin-bottom: 1.5rem;
        }
        h1 {
            font-family: "Zen Kaku Gothic New", sans-serif;
            font-weight: 700; font-size: 1.25rem; color: var(--ink);
            margin-bottom: 0.9rem;
        }
        p { color: #6b7280; font-size: 0.95rem; line-height: 1.9; max-width: 28rem; }
        .eyebrow {
            display: inline-block; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.18em; color: var(--brand);
            background: #eef4f2; border: 1px solid #d7e7e2;
            border-radius: 999px; padding: 0.35rem 0.9rem; margin-bottom: 1.75rem;
        }
        .copy { margin-top: 3rem; font-size: 0.75rem; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="bar"></div>
    <div class="logo">Kumoi</div>
    <span class="eyebrow">PREPARING</span>
    <h1>ただいま準備中です</h1>
    <p>現在、サービス内容を見直しております。<br>公開再開まで、いましばらくお待ちください。</p>
    <p class="copy">© 2026 Kumoi. All rights reserved.</p>
</body>
</html>
